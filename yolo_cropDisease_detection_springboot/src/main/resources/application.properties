spring.application.name=Ece
mybatis.mapper-locations=classpath:mappers/*xml
mybatis.type-aliases-package=com.example.Ece.mybatis.entity
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.name=defaultDataSource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/cropdisease?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
server.port=${SERVER_PORT:9999}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost}
app.flask-base-url=${APP_FLASK_BASE_URL:http://127.0.0.1:5000}
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB



